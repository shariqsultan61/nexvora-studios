<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexovra Studios  Coming Soon V. 2.0 </title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <canvas id="particle-canvas"></canvas>
  <div class="bg-glow"></div>

  <div id="maintenanceGate" role="dialog" aria-modal="true" aria-labelledby="mg-title">
    <div class="mg-box">

      <div class="top-line"></div>

      <div class="mg-badge">
        <span class="live-dot"></span>
        Maintenance
      </div>

      <span class="mg-icon">⚡</span>

      <h2 id="mg-title">
        <span class="grad-text">Nexovra Studios</span><br />
        is getting reimagined
      </h2>

      <p>We're crafting something extraordinary — a bold new experience built for creators who refuse to compromise.</p>

      <div class="mg-date">
        Going live: <strong>18 May 2025 </strong>
      </div>

      <div class="mg-divider"></div>

      <ul class="mg-features">
        <li>Web development services added</li>
        <li>Separate portfolio showcase</li>
        <li>Ui improved</li>
        <li>More Smooth</li>
      </ul>

      <div class="mg-progress-wrap">
        <div class="mg-progress-bar"></div>
      </div>
      <p class="mg-progress-label">82% complete</p>

      <button class="mg-btn" id="notifyBtn" onclick="handleNotify()">
        <span class="cal-icon" aria-hidden="true">📅</span>
        Done
      </button>



    </div>
  </div>

  <script src="main.js"></script>
</body>

</html>
