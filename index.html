<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="Nexovra Studios - Premium digital design services including Logos, Stream Overlays, Banners, and Websites for creators.">
  <meta name="keywords" content="Design, Stream Overlays, Logos, Branding, Web Development, Nexovra">
  <meta name="author" content="Nexovra Studios">

  <meta property="og:type" content="website">
  <meta property="og:title" content="Nexovra Studios | Premium Digital Design">
  <meta property="og:description" content="Building strong visual identities for streamers, creators, and brands.">


  <title>Nexovra Studio’s | Premium Digital Design</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <style>

    /* ================= UPDATE POPUP ================= */
#updatePopup {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  z-index: 999999;
  opacity: 0;
  pointer-events: none;
  transition: 0.4s ease;
}

#updatePopup.active {
  opacity: 1;
  pointer-events: auto;
}

/* Glass box */
.update-box {
  width: 320px;
  padding: 35px;
  border-radius: 20px;
  text-align: center;

  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  backdrop-filter: blur(20px);

  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  color: var(--text);

  transform: scale(0.9);
  transition: 0.3s ease;
}

#updatePopup.active .update-box {
  transform: scale(1);
}

/* Button */
.update-box button {
  margin-top: 20px;
  padding: 10px 25px;
  border: none;
  border-radius: 999px;
  cursor: pointer;
  font-weight: 700;

  background: var(--grad);
  color: white;
  transition: 0.3s;
}

.update-box button:hover {
  transform: scale(1.05);
}
    /* ================= ROOT / THEME ================= */
    :root {
      /* Dark Theme (Default) */
      --bg: #050510;
      --card-bg: rgba(255, 255, 255, 0.03);
      --card-border: rgba(255, 255, 255, 0.05);
      --text: #ffffff;
      --text-muted: rgba(255, 255, 255, 0.7);
      --nav-bg: rgba(20, 20, 40, 0.6);
      --blur-val: 16px;
      /* High Blur for Dark Mode */
      --grad: linear-gradient(90deg, #00ffff, #7f00ff);
      --shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.5);
      --glow-color: rgba(0, 255, 255, 0.3);
      --btn-text: #ffffff;
    }


    body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at 20% 20%, rgba(0,255,255,0.08), transparent 40%),
              radial-gradient(circle at 80% 80%, rgba(127,0,255,0.08), transparent 40%);
  animation: bgMove 12s ease-in-out infinite;
  z-index: -1;
}

@keyframes bgMove {
  0%,100% { transform: scale(1) translate(0,0); }
  50% { transform: scale(1.1) translate(20px,-20px); }
}

  body.light {
  --bg: #f0f2f5;
  --card-bg: rgba(255, 255, 255, 0.55); /* 👈 yeh change */
  --card-border: rgba(0, 0, 0, 0.08);
  --text: #1a1a1a;
  --text-muted: #555555;
  --nav-bg: rgba(255, 255, 255, 0.6);
  --blur-val: 12px;
  --shadow: 0 15px 35px -10px rgba(0, 0, 0, 0.1);
  --glow-color: rgba(127, 0, 255, 0.4);
}

    /* ================= RESET & SCROLLBAR ================= */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      /* GPU Acceleration hints */
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;

    }

    html {
      scroll-behavior: smooth;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 10px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg);
    }

    ::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 5px;
    }

    body.light ::-webkit-scrollbar-thumb {
      background: #ccc;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #7f00ff;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
      transition: background 0.4s cubic-bezier(0.25, 1, 0.5, 1), color 0.4s cubic-bezier(0.25, 1, 0.5, 1);
    }
    body.mobile-lite .cursor-glow {
  display: none !important;
}

body.mobile-lite .card {
  backdrop-filter: blur(6px) !important;
}

body.mobile-lite .hero {
  background-attachment: scroll !important;
}

    /* Utility to force white text on dark images regardless of theme */
    .force-light-text {
      color: #ffffff !important;
    }

    .force-light-text p {
      color: rgba(255, 255, 255, 0.8) !important;
    }

    /* ================= PRELOADER ================= */
    #loader {
      position: fixed;
      inset: 0;
      background: #050510;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999999;
      will-change: opacity, transform;
    }

    #loader h1 {
      font-size: clamp(2.5rem, 5vw, 4.2rem);
      font-weight: 900;
      color: #fff;
      animation: intro 2.2s cubic-bezier(0.19, 1, 0.22, 1) forwards;
      text-align: center;
      line-height: 1.1;
      will-change: transform, opacity;
    }

    #loader span {
      background: var(--grad);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    @keyframes intro {
      0% {
        opacity: 0;
        transform: scale(0.8) translateY(20px);
      }

      50% {
        opacity: 1;
        transform: scale(1) translateY(0);
      }

      100% {
        opacity: 0;
        transform: scale(1.1);
        pointer-events: none;
      }
    }

    /* ================= NAVBAR ================= */
    nav {
 
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 92%;
      max-width: 1400px;
      padding: 16px 34px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--nav-bg);
      /* Using variable blur value */
      backdrop-filter: blur(var(--blur-val));
      -webkit-backdrop-filter: blur(var(--blur-val));
      border: 1px solid var(--card-border);
      border-radius: 24px;
      z-index: 1000;
      transition: background 0.4s ease, border-color 0.4s ease, backdrop-filter 0.4s ease;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
      will-change: transform;
    }

    nav a.logo {
      color: var(--text);
      text-decoration: none;
      font-weight: 800;
      font-size: 1.2rem;
      letter-spacing: -0.5px;
    }

    #nav-links {
      display: flex;
      align-items: center;
      gap: 30px;
    }

    #nav-links a {
      color: var(--text);
      text-decoration: none;
      font-weight: 500;
      font-size: 0.95rem;
      transition: 0.3s;
      opacity: 0.8;
      position: relative;
    }
    nav:hover {
  transform: translateX(-50%) scale(1.01);
}

    #nav-links a:hover {
      opacity: 1;
      color: #7f00ff;
    }

    /* Theme Toggle Button */
    #themeBtn {
      border: none;
      background: var(--grad);
      color: #fff;
      padding: 8px 18px;
      border-radius: 999px;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.9rem;
      box-shadow: 0 4px 15px rgba(0, 255, 255, 0.3);
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease;
      min-width: 110px;
      /* Fixed width to prevent jumping when text changes */
    }

    body.light #themeBtn {
      box-shadow: 0 4px 15px rgba(127, 0, 255, 0.3);
      /* Different shadow for light mode */
    }

    #themeBtn:active {
      transform: scale(0.95);
    }

    #nav-toggle {
      display: none;
      flex-direction: column;
      cursor: pointer;
      gap: 5px;
    }

    #nav-toggle span {
      width: 26px;
      height: 2px;
      background: var(--text);
      border-radius: 2px;
      transition: 0.3s;
    }

    /* ================= SECTIONS ================= */
    section {
      padding: 140px 0;
      position: relative;
    }

    .container {
      width: 90%;
      max-width: 1280px;
      margin: auto;
    }

    h1,
    h2,
    h3 {
      font-weight: 800;
      line-height: 1.2;
    }

    h2 {
      margin-bottom: 40px;
      font-size: clamp(2rem, 4vw, 3rem);
      text-align: center;
    }

    p {
      color: var(--text-muted);
      line-height: 1.7;
      font-size: 1.05rem;
    }

    /* ================= HERO ================= */
    .hero {
      min-height: 100vh;
      background-attachment: scroll;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      .hero {
  background:
    linear-gradient(135deg, rgba(5,5,16,0.8), rgba(5,5,16,0.95)),
    radial-gradient(circle at 20% 30%, rgba(0,255,255,0.2), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(127,0,255,0.2), transparent 40%),
    url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&w=2070&auto=format&fit=crop');

  background-size: cover;
  background-position: center;
}
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      will-change: transform;
      /* Optimizes fixed background */
    }

    .reveal {
  opacity: 0;
  transform: translateY(60px) scale(0.98);
  transition: all 0.9s cubic-bezier(0.22, 1, 0.36, 1);
}

.reveal.active {
  opacity: 1;
  transform: translateY(0) scale(1);
}
    .hero h1 {
      font-size: clamp(3.5rem, 7vw, 6rem);
      margin-bottom: 20px;
      letter-spacing: -2px;
    }

    .hero h1 span {
      background: var(--grad);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .hero p {
      font-size: 1.25rem;
      max-width: 600px;
      margin: 0 auto;
      color: rgba(255, 255, 255, 0.85);
    }

    /* ================= GRIDS & CARDS ================= */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 30px;
    }

    .card {
      background: var(--card-bg);
      padding: 40px 30px;
      border-radius: 24px;
      border: 1px solid var(--card-border);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      /* Optimized Transition */
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275),
        box-shadow 0.4s ease,
        border-color 0.4s ease;
      position: relative;
      overflow: hidden;
      backface-visibility: hidden;
  background: var(--card-bg);
  
  backdrop-filter: blur(var(--blur-val));
  -webkit-backdrop-filter: blur(var(--blur-val));

      /* Reduces flicker */
      transform: translate3d(0, 0, 0);
      /* Force GPU */

    }

    /* Hover effect handled by JS physics, fallback here */
    .card:hover {
      border-color: rgba(0, 255, 255, 0.3);
      box-shadow: var(--shadow);
    }

    .service-icon {
      width: 70px;
      height: 70px;
      margin-bottom: 24px;
      object-fit: contain;
      filter: drop-shadow(0 0 15px rgba(127, 0, 255, 0.2));
      transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
    }

    .card:hover .service-icon {
      transform: scale(1.1) rotate(5deg);
    }

    .portfolio-img {
      width: 100%;
      height: 240px;
      object-fit: cover;
      border-radius: 16px;
      display: block;
      margin-bottom: 20px;
      background: #000;
    }

    /* Workflow specific */
    .workflow-icon {
      width: 60px;
      height: 60px;
      margin-bottom: 20px;
    }

    /* ================= SPLIT SECTION ================= */
    .split-section {
      display: flex;
      align-items: center;
      gap: 80px;
    }

    .split-content {
      flex: 1;
    }

    .split-content h2 {
      text-align: left;
    }

    .split-image {
      flex: 1;
    }

    .split-image img {
      width: 100%;
      border-radius: 24px;
      box-shadow: var(--shadow);
      transform: rotate(2deg);
      transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
      will-change: transform;
    }

    .split-image:hover img {
      transform: rotate(0deg) scale(1.02);
    }

    /* ================= CTA ================= */
    .cta {
      margin: 0 auto;
      width: 92%;
      max-width: 1400px;
      text-align: center;
      background: linear-gradient(135deg, rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.4)),
        url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop');
      background-size: cover;
      background-position: center;
      padding: 120px 20px;
      border-radius: 40px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 20px 50px -10px rgba(0, 0, 0, 0.5);
    }

    /* ================= FOOTER ================= */
    .minimal-footer {
      width: 92%;
      max-width: 1400px;
      margin: 80px auto 40px;
      padding: 60px 20px;
      background: var(--nav-bg);
      backdrop-filter: blur(var(--blur-val));
      -webkit-backdrop-filter: blur(var(--blur-val));
      border: 1px solid var(--card-border);
      border-radius: 30px;
      text-align: center;
      transition: background 0.4s, backdrop-filter 0.4s;
    }

    .minimal-footer h2 span {
      background: var(--grad);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .footer-social {
      margin: 30px 0;
    }

    .footer-social a {
      color: var(--text);
      text-decoration: none;
      margin: 0 15px;
      font-weight: 600;
      transition: .3s;
      position: relative;
      padding-bottom: 5px;
    }

    .footer-social a::after {
      content: '';
      position: absolute;
      width: 0;
      height: 2px;
      bottom: 0;
      left: 0;
      background: var(--grad);
      transition: 0.3s cubic-bezier(0.25, 1, 0.5, 1);
    }

    .footer-social a:hover::after {
      width: 100%;
    }

    .footer-copy {
      font-size: 0.8rem;
      opacity: 0.6;
      max-width: 600px;
      margin: 0 auto 10px;
    }

    /* ================= POPUP ================= */
    #popup {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
      z-index: 999999;
      backdrop-filter: blur(5px);
    }

    #popup.active {
      opacity: 1;
      pointer-events: auto;
    }

    .popup-box {
      background: #1a1a2e;
      padding: 50px;
      border-radius: 24px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      color: #fff;
      transform: scale(0.95);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    #popup.active .popup-box {
      transform: scale(1);
    }

    .popup-box button {
      margin-top: 25px;
      padding: 12px 30px;
      border: none;
      border-radius: 999px;
      background: var(--grad);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .popup-box button:hover {
      transform: scale(1.05);
    }

    /* ================= CURSOR GLOW (Optimized) ================= */
    .cursor-glow {
      position: fixed;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      pointer-events: none;
      background: radial-gradient(circle, var(--glow-color), transparent 60%);
      mix-blend-mode: screen;
      /* Initial state centered but hidden */
      top: 0;
      left: 0;
      transform: translate3d(-50%, -50%, 0);
      z-index: 9999;
      opacity: 0;
      transition: opacity 0.5s ease;
      will-change: transform;
      /* Important for performance */
    }

    /* Hide custom cursor logic on touch */
    @media (hover: none) {
      .cursor-glow {
        display: none;
      }
    }

    /* ================= MOBILE RESPONSIVE ================= */
    @media (max-width: 900px) {
      .split-section {
        flex-direction: column;
        gap: 40px;
      }

      .split-image img {
        transform: rotate(0);
      }

      .split-content h2 {
        text-align: center;
      }

      .split-content p {
        text-align: center;
      }
    }

    @media (max-width: 768px) {
      nav {
        padding: 15px 24px;
      }

      #nav-links {
        position: absolute;
        top: 70px;
        left: 0;
        width: 100%;
        background: var(--bg);
        border: 1px solid var(--card-border);
        flex-direction: column;
        padding: 30px;
        border-radius: 20px;
        display: none;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
      }

      #nav-links.active {
        display: flex;
        animation: slideDown 0.3s ease forwards;
      }

      @keyframes slideDown {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      #nav-toggle {
        display: flex;
      }

      #nav-toggle.active span:nth-child(1) {
        transform: rotate(-45deg) translate(-5px, 6px);
      }

      #nav-toggle.active span:nth-child(2) {
        opacity: 0;
      }

      #nav-toggle.active span:nth-child(3) {
        transform: rotate(45deg) translate(-5px, -6px);
      }

      .hero h1 {
        font-size: 2.8rem;
      }

      .grid {
        gap: 20px;
      }

      .cta {
        padding: 80px 20px;
      }
    }

    .bg-orb {
      position: fixed;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      filter: blur(120px);
      z-index: -1;
      opacity: 0.4;
      animation: float 20s infinite ease-in-out;
    }

    .orb1 {
      background: #7f00ff;
      top: 10%;
      left: 10%;
    }

    .orb2 {
      background: #00ffff;
      bottom: 10%;
      right: 10%;
      animation-delay: 5s;
    }

    .orb3 {
      background: #ff00ff;
      top: 50%;
      left: 50%;
      animation-delay: 10s;
    }

    @keyframes float {

      0%,
      100% {
        transform: translate(0, 0) scale(1);
      }

      50% {
        transform: translate(80px, -60px) scale(1.2);
      }
    }
  </style>
</head>

<!-- UPDATE POPUP -->

  <div class="update-box">        
    <h2>🚀 Update Coming Soon</h2>
    <p>Update is coming on <b>17 May 2025</b></p>
    <p style="font-size:0.9rem; opacity:0.7;">
      New colors + UI improvements will be introduced.
    </p>
